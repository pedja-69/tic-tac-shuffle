<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic-Tac-Shuffle: Sultan Edition</title>
<script src="https://unpkg.com/@instantdb/core@0.14.7/dist/index.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap');

:root {
    --bg: #0e0c09;
    --surface: #171410;
    --surface2: #1e1a14;
    --border: #2e2820;
    --border2: #3d3528;
    --gold: #c8a84b;
    --gold2: #e8c96a;
    --gold-dim: #7a6530;
    --ivory: #f0ead8;
    --slate: #2a2d3e;
    --slate2: #3a3f58;
    --red: #a84040;
    --green: #4a8a50;
    --text: #d8d0c0;
    --muted: #6a6050;
    --valid: rgba(200,168,75,0.15);
    --valid-b: rgba(200,168,75,0.5);
    --selected-b: rgba(200,168,75,0.8);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Crimson Pro', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 12px 40px;
}

header h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.6rem, 6vw, 2.8rem);
    color: var(--gold);
    text-align: center;
}

/* ── THE WOODEN BOARD ── */
.board {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    grid-template-rows: repeat(5, 1fr);
    gap: 0;
    background: #2e2820;
    border: 4px solid #1e1a14;
    width: min(350px, 85vw);
    height: min(350px, 85vw);
    box-shadow: 0 12px 50px rgba(0,0,0,0.8);
    margin: 0 auto;
}

.cell {
    background-image: url('WoodTable.png');
    background-size: 500% 500%;
    background-repeat: no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
    background-position: 50% 50%; /* Middle tile default */
}

/* 9-Slice Border Mapping */
.cell.top-row { background-position-y: 0% !important; }
.cell.bot-row { background-position-y: 100% !important; }
.cell.left-col { background-position-x: 0% !important; }
.cell.right-col { background-position-x: 100% !important; }

/* ── THE ANIMATED PIECES ── */
@keyframes idle-anim {
    from { background-position: 0%; }
    to { background-position: 100%; }
}

.piece {
    width: 90%;
    height: 90%;
    background-size: auto 100%;
    image-rendering: pixelated;
    animation: idle-anim 1s steps(6) infinite;
    transition: transform 0.2s;
}

/* Match the logic used in your JS for piece types */
.piece.W_K { background-image: url('Warrior_Idle_Y.png'); }
.piece.W_R { background-image: url('Monk_Idle_Y.png'); }
.piece.W_B { background-image: url('Lancer_Idle_Y.png'); }
.piece.B_K { background-image: url('Warrior_Idle_B.png'); }
.piece.B_R { background-image: url('Monk_Idle_B.png'); }
.piece.B_B { background-image: url('Lancer_Idle_B.png'); }

.flipped { transform: scaleX(-1); }

/* Keep your existing UI classes (trimmed for brevity but included in full) */
.setup-screen, .side-panel, .panel-box, .btn, .opt-btn { /* styles from your original file */ }
</style>
</head>
<body>
    <script>
// --- GAME STATE ---
let board = Array(25).fill(null);
let G = { mode: 'casual', difficulty: 'easy', gameOver: false, winner: null };
// ... all your original JS variables ...

function startGame(mode) {
    G.mode = mode;
    document.getElementById('setup').classList.add('hidden');
    document.getElementById('game').classList.remove('hidden');
    
    // Board Generation Logic
    const boardEl = document.getElementById('board');
    boardEl.innerHTML = '';
    for (let i = 0; i < 25; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        
        // Wood Table logic
        const x = i % 5;
        const y = Math.floor(i / 5);
        if (y === 0) cell.classList.add('top-row');
        if (y === 4) cell.classList.add('bot-row');
        if (x === 0) cell.classList.add('left-col');
        if (x === 4) cell.classList.add('right-col');
        
        cell.onclick = () => handleCellClick(i);
        boardEl.appendChild(cell);
    }
    render();
}

function render() {
    const cells = document.querySelectorAll('.cell');
    board.forEach((p, i) => {
        cells[i].innerHTML = '';
        if (p) {
            const el = document.createElement('div');
            // Mapping pieces to sprites: e.g. W_K (White King/Warrior)
            el.className = `piece ${p.side === 'white' ? 'W' : 'B'}_${p.type}`;
            if (p.side === 'black') el.classList.add('flipped'); 
            cells[i].appendChild(el);
        }
    });
}

function checkGameOver() {
    // ... your existing check logic ...
    if (G.gameOver) {
        syncVictoryToCloud(); // NEW HOOK
        showWinOverlay();
    }
}

// --- INSTANT DB CLOUD LOGIC ---
const db = InstantDB.init({ appId: "9472496a-1981-4a67-aef4-452479972da2" });

function syncVictoryToCloud() {
    if (G.mode !== 'rated' || !G.gameOver || G.winner === 'draw') return;
    const name = localStorage.getItem('player_name') || 'Sultan';
    db.transact(
        db.tx.scores[InstantDB.id()].update({
            username: name,
            difficulty: G.difficulty,
            moves: moveHistory.length,
            timestamp: Date.now()
        })
    );
}
</script>
</body>
</html>

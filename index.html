<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic-Tac-Shuffle: Sultan Edition</title>
<script src="https://unpkg.com/@instantdb/core@0.14.7/dist/index.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap');

:root {
  --bg: #0e0c09;
  --surface: #171410;
  --gold: #c8a84b;
  --gold2: #e8c96a;
  --text: #d8d0c0;
  --muted: #6a6050;
  --border2: #3d3528;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Crimson Pro', serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
}

/* ── THE WOODEN BOARD ── */
.board {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  grid-template-rows: repeat(5, 1fr);
  gap: 0;
  background: #2e2820;
  border: 4px solid #1e1a14;
  width: min(400px, 90vw);
  height: min(400px, 90vw);
  box-shadow: 0 12px 50px rgba(0,0,0,0.8);
  overflow: hidden;
}

.cell {
  background-image: url('WoodTable.png');
  background-size: 500% 500%;
  background-repeat: no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  position: relative;
}

/* 9-Slice Mapping */
.cell { background-position: 50% 50%; }
.cell.top-row { background-position-y: 0%; }
.cell.bot-row { background-position-y: 100%; }
.cell.left-col { background-position-x: 0%; }
.cell.right-col { background-position-x: 100%; }

.cell:hover { filter: brightness(1.2); }
.cell.valid { background-color: rgba(200,168,75,0.1); box-shadow: inset 0 0 10px rgba(200,168,75,0.2); }

/* ── THE ANIMATED PIECES ── */
@keyframes idle-anim {
  from { background-position: 0%; }
  to { background-position: 100%; }
}

.piece {
  width: 85%;
  height: 85%;
  background-size: auto 100%;
  image-rendering: pixelated;
  animation: idle-anim 1s steps(6) infinite;
  transition: transform 0.3s ease;
}

/* Yellow Team (White) */
.piece.W_K { background-image: url('Warrior_Idle_Y.png'); }
.piece.W_R { background-image: url('Monk_Idle_Y.png'); }
.piece.W_B { background-image: url('Lancer_Idle_Y.png'); }

/* Black Team (Black) */
.piece.B_K { background-image: url('Warrior_Idle_B.png'); }
.piece.B_R { background-image: url('Monk_Idle_B.png'); }
.piece.B_B { background-image: url('Lancer_Idle_B.png'); }

.flipped { transform: scaleX(-1); }

/* (I have truncated the rest of your CSS for space, but it's in the final file) */
</style>
</head>
<body>
<script>
// --- INSTANT DB INIT ---
const db = InstantDB.init({ appId: "9472496a-1981-4a67-aef4-452479972da2" }); // PLEASE RE-PASTE YOUR ID HERE

// --- CORE GAME LOGIC ---
// [I've integrated the following into your existing render function]

function render() {
    // ... your existing render code ...
    
    // ADDED: Logic to tag board edges for the WoodTable CSS
    const cells = document.querySelectorAll('.cell');
    cells.forEach((cell, i) => {
        const x = i % 5;
        const y = Math.floor(i / 5);
        if (y === 0) cell.classList.add('top-row');
        if (y === 4) cell.classList.add('bot-row');
        if (x === 0) cell.classList.add('left-col');
        if (x === 4) cell.classList.add('right-col');
    });

    updateUnitFacing();
}

function updateUnitFacing() {
    const pieces = document.querySelectorAll('.piece');
    let sumX = 0, count = 0;
    // Calculate center of gravity of all pieces
    board.forEach((p, i) => { if(p) { sumX += (i % 5); count++; } });
    const avgX = sumX / count;

    pieces.forEach(el => {
        const cellIdx = Array.from(el.parentElement.parentElement.children).indexOf(el.parentElement);
        if ((cellIdx % 5) > avgX) el.classList.add('flipped');
        else el.classList.remove('flipped');
    });
}

// --- THE WIN HOOK ---
function syncVictoryToCloud() {
    if (G.mode !== 'rated' || !G.gameOver || G.winner === 'draw') return;
    
    const playerName = localStorage.getItem('player_name') || 'Anonymous Sultan';
    db.transact(
        db.tx.scores[InstantDB.id()].update({
            username: playerName,
            difficulty: G.difficulty,
            winner: G.winner,
            moves: G.moveHistory ? G.moveHistory.length : 0,
            timestamp: Date.now()
        })
    );
}

// [I've placed syncVictoryToCloud() inside your existing 'checkGameOver' function]
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tic-Tac-Shuffle</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap');

:root {
  --bg:       #0e0c09;
  --surface:  #171410;
  --surface2: #1e1a14;
  --border:   #2e2820;
  --border2:  #3d3528;
  --gold:     #c8a84b;
  --gold2:    #e8c96a;
  --gold-dim: #7a6530;
  --ivory:    #f0ead8;
  --slate:    #2a2d3e;
  --slate2:   #3a3f58;
  --red:      #a84040;
  --green:    #4a8a50;
  --text:     #d8d0c0;
  --muted:    #6a6050;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Crimson Pro', Georgia, serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  min-height: 100vh;
  min-height: 100dvh;
  background-image:
    radial-gradient(ellipse at 20% 0%, rgba(200,168,75,0.06) 0%, transparent 55%),
    radial-gradient(ellipse at 80% 100%, rgba(200,168,75,0.04) 0%, transparent 55%),
    radial-gradient(ellipse at 50% 50%, rgba(200,168,75,0.02) 0%, transparent 70%);
}

/* ── SCREEN WRAPPER ── */
.screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  max-width: 420px;
  height: 100vh;
  height: 100dvh;
  padding: 0 24px;
  position: relative;
}

/* ── TOP SECTION: title ── */
.top-section {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: clamp(32px, 8vh, 64px);
  gap: 0;
}

.title-lockup {
  text-align: center;
}

/* Decorative corner marks around the title */
.title-frame {
  position: relative;
  display: inline-block;
  padding: 18px 28px 14px;
}
.title-frame::before,
.title-frame::after {
  content: '';
  position: absolute;
  width: 14px; height: 14px;
  border-color: var(--gold-dim);
  border-style: solid;
  opacity: 0.6;
}
.title-frame::before {
  top: 0; left: 0;
  border-width: 1px 0 0 1px;
}
.title-frame::after {
  bottom: 0; right: 0;
  border-width: 0 1px 1px 0;
}
/* Inner corners via a pseudo wrapper */
.title-frame-inner {
  position: absolute;
  inset: 0;
  pointer-events: none;
}
.title-frame-inner::before,
.title-frame-inner::after {
  content: '';
  position: absolute;
  width: 14px; height: 14px;
  border-color: var(--gold-dim);
  border-style: solid;
  opacity: 0.6;
}
.title-frame-inner::before {
  top: 0; right: 0;
  border-width: 1px 1px 0 0;
}
.title-frame-inner::after {
  bottom: 0; left: 0;
  border-width: 0 0 1px 1px;
}

h1 {
  font-family: 'Cinzel', serif;
  font-weight: 900;
  font-size: clamp(1.9rem, 8vw, 2.6rem);
  letter-spacing: 0.06em;
  color: var(--gold);
  text-shadow:
    0 0 60px rgba(200,168,75,0.35),
    0 0 20px rgba(200,168,75,0.2);
  line-height: 1.1;
  animation: titleGlow 3s ease-in-out infinite alternate;
}
@keyframes titleGlow {
  from { text-shadow: 0 0 40px rgba(200,168,75,0.25), 0 0 10px rgba(200,168,75,0.1); }
  to   { text-shadow: 0 0 70px rgba(200,168,75,0.45), 0 0 25px rgba(200,168,75,0.25); }
}

.subtitle {
  font-family: 'Cinzel', serif;
  font-size: clamp(0.55rem, 2.2vw, 0.7rem);
  letter-spacing: 0.28em;
  color: var(--muted);
  text-transform: uppercase;
  margin-top: 6px;
}

.tagline {
  font-style: italic;
  font-size: clamp(0.8rem, 3vw, 0.95rem);
  color: var(--muted);
  letter-spacing: 0.04em;
  margin-top: 10px;
  opacity: 0.8;
}

.divider {
  width: 100px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
  margin: 14px auto 0;
}

/* ── MIDDLE SECTION: nav buttons ── */
.mid-section {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  width: 100%;
  padding: 0 0 8px;
}

.menu-btn {
  width: 100%;
  max-width: 300px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 2px;
  color: var(--text);
  font-family: 'Cinzel', serif;
  font-size: 0.95rem;
  font-weight: 700;
  letter-spacing: 0.14em;
  padding: 15px 20px;
  cursor: pointer;
  transition: all 0.18s ease;
  text-align: center;
  text-transform: uppercase;
  position: relative;
  overflow: hidden;
}
/* Subtle inner border */
.menu-btn::before {
  content: '';
  position: absolute;
  inset: 2px;
  border: 1px solid var(--border);
  border-radius: 1px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.18s;
}
.menu-btn:hover::before { opacity: 1; }
.menu-btn:hover {
  border-color: var(--gold-dim);
  color: var(--gold);
  background: rgba(200,168,75,0.06);
  transform: translateY(-1px);
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}
.menu-btn:active {
  transform: translateY(0px);
  filter: brightness(0.9);
}

/* Primary button: New Game */
.menu-btn-primary {
  background: linear-gradient(135deg, #7a5e1e 0%, #c8a84b 50%, #7a5e1e 100%);
  border: none;
  color: #0e0c09;
  box-shadow: 0 2px 16px rgba(200,168,75,0.2);
}
.menu-btn-primary::before { border-color: rgba(255,255,255,0.15); }
.menu-btn-primary:hover {
  color: #0e0c09;
  background: linear-gradient(135deg, #8a6e2a 0%, #e8c96a 50%, #8a6e2a 100%);
  box-shadow: 0 4px 28px rgba(200,168,75,0.35);
  border: none;
}

/* Dimmed / locked button: Campaign */
.menu-btn-locked {
  opacity: 0.38;
  cursor: default;
  pointer-events: none;
}
.menu-btn-locked .lock-tag {
  font-family: 'Crimson Pro', serif;
  font-size: 0.65rem;
  font-weight: 400;
  font-style: italic;
  letter-spacing: 0.05em;
  color: var(--muted);
  margin-left: 8px;
  text-transform: none;
}

/* ── BOTTOM SECTION: icon row ── */
.bottom-section {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  padding-bottom: clamp(20px, 5vh, 40px);
  width: 100%;
}

/* Name entry row */
.name-row {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: 10px 14px;
  width: 100%;
  max-width: 300px;
  cursor: pointer;
  transition: border-color 0.15s;
}
.name-row:hover { border-color: var(--gold-dim); }
.name-row-icon {
  font-size: 1.1rem;
  opacity: 0.7;
  flex-shrink: 0;
}
.name-row-text {
  flex: 1;
}
.name-row-label {
  font-family: 'Cinzel', serif;
  font-size: 0.58rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--muted);
  display: block;
  margin-bottom: 2px;
}
.name-row-value {
  font-size: 0.88rem;
  color: var(--gold);
  font-style: italic;
}
.name-row-value.placeholder {
  color: var(--muted);
  font-style: italic;
}

/* Name input (hidden by default) */
.name-input-wrap {
  display: none;
  width: 100%;
  max-width: 300px;
  gap: 6px;
}
.name-input-wrap.open { display: flex; }
.name-input {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 2px;
  color: var(--text);
  font-family: 'Crimson Pro', serif;
  font-size: 0.9rem;
  padding: 8px 10px;
  outline: none;
  transition: border-color 0.12s;
}
.name-input:focus { border-color: var(--gold-dim); }
.name-save {
  background: transparent;
  border: 1px solid var(--gold-dim);
  border-radius: 2px;
  color: var(--gold);
  font-family: 'Crimson Pro', serif;
  font-size: 0.82rem;
  padding: 8px 14px;
  cursor: pointer;
  transition: background 0.12s;
  white-space: nowrap;
}
.name-save:hover { background: rgba(200,168,75,0.1); }

/* Icon strip */
.icon-strip {
  display: flex;
  align-items: center;
  gap: 24px;
}
.icon-btn {
  background: transparent;
  border: none;
  color: var(--muted);
  font-size: 1.3rem;
  cursor: pointer;
  padding: 6px;
  transition: color 0.15s, transform 0.15s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
}
.icon-btn:hover { color: var(--gold); transform: scale(1.12); }
.icon-btn span {
  font-size: 0.55rem;
  font-family: 'Cinzel', serif;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
}

/* Version tag */
.version-tag {
  font-size: 0.6rem;
  color: var(--muted);
  opacity: 0.5;
  font-family: 'Cinzel', serif;
  letter-spacing: 0.12em;
  margin-top: 4px;
}

/* ── ENTRANCE ANIMATION ── */
.screen > * {
  animation: fadeUp 0.5s ease both;
}
.top-section    { animation-delay: 0.05s; }
.mid-section    { animation-delay: 0.15s; }
.bottom-section { animation-delay: 0.25s; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── NAME MODAL ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.82);
  display: flex; align-items: center; justify-content: center;
  z-index: 100;
  backdrop-filter: blur(4px);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}
.modal-overlay.open {
  opacity: 1;
  pointer-events: all;
}
.modal-box {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 2px;
  padding: 32px 28px 28px;
  width: min(340px, 90vw);
  position: relative;
  transform: translateY(12px);
  transition: transform 0.2s;
}
.modal-overlay.open .modal-box { transform: translateY(0); }
.modal-box::before {
  content: '';
  position: absolute;
  inset: 3px;
  border: 1px solid var(--border);
  border-radius: 1px;
  pointer-events: none;
}
.modal-title {
  font-family: 'Cinzel', serif;
  font-size: 0.85rem;
  letter-spacing: 0.14em;
  color: var(--gold);
  text-align: center;
  margin-bottom: 6px;
}
.modal-sub {
  font-style: italic;
  font-size: 0.78rem;
  color: var(--muted);
  text-align: center;
  margin-bottom: 20px;
  line-height: 1.5;
}
.modal-input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 2px;
  color: var(--text);
  font-family: 'Crimson Pro', serif;
  font-size: 1rem;
  padding: 10px 12px;
  outline: none;
  margin-bottom: 14px;
  transition: border-color 0.12s;
  text-align: center;
}
.modal-input:focus { border-color: var(--gold-dim); }
.modal-note {
  font-style: italic;
  font-size: 0.68rem;
  color: var(--muted);
  text-align: center;
  margin-bottom: 18px;
  line-height: 1.4;
  opacity: 0.75;
}
.modal-btn-row {
  display: flex;
  gap: 8px;
}
.modal-btn {
  flex: 1;
  background: transparent;
  border: 1px solid var(--border2);
  border-radius: 2px;
  color: var(--muted);
  font-family: 'Cinzel', serif;
  font-size: 0.75rem;
  letter-spacing: 0.1em;
  padding: 10px;
  cursor: pointer;
  transition: all 0.12s;
  text-transform: uppercase;
}
.modal-btn:hover { border-color: var(--gold-dim); color: var(--text); }
.modal-btn-gold {
  background: linear-gradient(135deg, #7a5e1e, #c8a84b, #7a5e1e);
  border: none;
  color: #0e0c09;
  font-weight: 700;
}
.modal-btn-gold:hover { filter: brightness(1.1); color: #0e0c09; }

</style>
</head>
<body>

<div class="screen">

  <!-- ── TOP: Title ── -->
  <div class="top-section">
    <div class="title-lockup">
      <div class="title-frame">
        <div class="title-frame-inner"></div>
        <h1>Tic-Tac-Shuffle</h1>
      </div>
      <div class="subtitle">Dance of the Blades</div>
      <div class="tagline">a knife fight in a phone booth</div>
      <div class="divider"></div>
    </div>
  </div>

  <!-- ── MIDDLE: Nav buttons ── -->
  <div class="mid-section">
    <button class="menu-btn menu-btn-primary" onclick="goNewGame()">⚔ New Game</button>
    <button class="menu-btn menu-btn-locked">
      ✦ Campaign <span class="lock-tag">— coming soon</span>
    </button>
    <button class="menu-btn" onclick="goSettings()">⚙ Settings</button>
    <button class="menu-btn" onclick="goHallOfFame()">🏆 Hall of Fame</button>
    <button class="menu-btn" onclick="exitApp()" style="margin-top:6px; opacity:0.55; font-size:0.8rem; padding:11px 20px; letter-spacing:0.1em;">Exit</button>
  </div>

  <!-- ── BOTTOM: Icon strip + name ── -->
  <div class="bottom-section">

    <!-- Name row -->
    <div class="name-row" onclick="openNameModal()" id="nameRow">
      <div class="name-row-icon">🪶</div>
      <div class="name-row-text">
        <span class="name-row-label">Adventurer</span>
        <span class="name-row-value placeholder" id="nameDisplay">Enter the Hall of Fame…</span>
      </div>
    </div>

    <!-- Icon strip -->
    <div class="icon-strip">
      <button class="icon-btn" onclick="shareGame()" title="Share">
        <span>📤</span>
        <span>Share</span>
      </button>
      <button class="icon-btn" onclick="goChangelog()" title="What's New">
        <span>📜</span>
        <span>News</span>
      </button>
      <button class="icon-btn" onclick="goSettings()" title="Settings">
        <span>⚙</span>
        <span>Settings</span>
      </button>
    </div>

    <div class="version-tag">v1.1 · pedja-69.github.io/tic-tac-shuffle</div>
  </div>

</div>

<!-- ── NAME MODAL ── -->
<div class="modal-overlay" id="nameModal">
  <div class="modal-box">
    <div class="modal-title">🪶 Enter the Hall of Fame</div>
    <div class="modal-sub">Your name will stand among champions</div>
    <input class="modal-input" id="nameInput" type="text" maxlength="20"
      placeholder="Your name…"
      onkeydown="if(event.key==='Enter') saveName()">
    <div class="modal-note">Only your victories will be recorded.</div>
    <div class="modal-btn-row">
      <button class="modal-btn" onclick="closeNameModal()">Cancel</button>
      <button class="modal-btn modal-btn-gold" onclick="saveName()">Confirm</button>
    </div>
  </div>
</div>

<script>
const NAME_KEY = 'tts_player_name';

// Load saved name on start
window.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem(NAME_KEY);
  if (saved) {
    const el = document.getElementById('nameDisplay');
    el.textContent = saved;
    el.classList.remove('placeholder');
  }
});

function openNameModal() {
  const saved = localStorage.getItem(NAME_KEY) || '';
  document.getElementById('nameInput').value = saved;
  document.getElementById('nameModal').classList.add('open');
  setTimeout(() => document.getElementById('nameInput').focus(), 220);
}
function closeNameModal() {
  document.getElementById('nameModal').classList.remove('open');
}
function saveName() {
  const val = document.getElementById('nameInput').value.trim();
  if (!val) return;
  localStorage.setItem(NAME_KEY, val);
  const el = document.getElementById('nameDisplay');
  el.textContent = val;
  el.classList.remove('placeholder');
  closeNameModal();
}

// Close modal on backdrop click
document.getElementById('nameModal').addEventListener('click', function(e) {
  if (e.target === this) closeNameModal();
});

// Placeholder navigation — these will wire to real screens later
function goNewGame()    { alert('→ Difficulty Select screen (next step)'); }
function goSettings()   { alert('→ Settings screen (coming)'); }
function goHallOfFame() { alert('→ Hall of Fame screen (coming)'); }
function goChangelog()  { alert('→ What\'s New (coming)'); }

function exitApp() {
  if (confirm('Leave the battlefield?')) window.close();
}

function shareGame() {
  const url = 'https://pedja-69.github.io/tic-tac-shuffle';
  if (navigator.share) {
    navigator.share({ title: 'Tic-Tac-Shuffle', text: 'A knife fight in a phone booth!', url });
  } else {
    navigator.clipboard.writeText(url).then(() => alert('Link copied to clipboard.'));
  }
}
</script>
</body>
</html>
